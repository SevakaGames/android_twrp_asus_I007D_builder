name: Recovery Builder

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-11"
  DEVICE_CHOICE: "omni_ASUS_I007_1-eng"
  DEVICE_PATH: "device/asus/ASUS_I007_1"
  DEVICE_NAME: "ASUS_I007_1"
  MAKEFILE_NAME: "omni_ASUS_I007_1"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Check out repo
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc cpio

    - name: Set up Repo tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize and Sync TWRP Manifest
      run: |
        mkdir ~/twrp
        cd ~/twrp
        repo init --u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }} --depth=1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ~/twrp
        git clone https://github.com/SevakaGames/android_twrp_asus_I007D.git -b main ${{ env.DEVICE_PATH }}

    - name: Building Recovery
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch ${{ env.DEVICE_CHOICE }}
        make bootimage -j$(nproc --all)

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Boot-ASUS-I007D
        path: /home/runner/twrp/out/target/product/${{ env.DEVICE_NAME }}/boot.img
